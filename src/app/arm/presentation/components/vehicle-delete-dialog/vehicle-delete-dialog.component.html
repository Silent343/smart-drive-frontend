<h2 mat-dialog-title>{{ 'vehicles.dialog.deleteTitle' | translate }}</h2>
<mat-dialog-content>
  <p>{{ 'vehicles.dialog.deleteConfirm' | translate: { model: data.specification?.brand + ' ' + data.specification?.model } }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false">No</button>
  <button mat-flat-button color="warn" [mat-dialog-close]="true">
    {{ 'vehicles.actions.delete' | translate }}
  </button>
</mat-dialog-actions>
